name: 🔄 Mettre à jour tous les bots

on:
  workflow_dispatch:   # lancement manuel depuis GitHub Actions

jobs:
  meteo:
    name: Agent Météo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Dépendances
        run: pip install requests supabase python-dotenv mistralai
      - name: Lancer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
        run: python bot/agent_meteo_cloud.py

  crypto:
    name: Agent Crypto Horaire
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Dépendances
        run: pip install requests supabase python-dotenv
      - name: Lancer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python bot/agent_crypto_cloud.py

  crypto_4h:
    name: Agent Crypto 4H
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Dépendances
        run: pip install requests supabase python-dotenv
      - name: Lancer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python bot/agent_crypto_4h_cloud.py
